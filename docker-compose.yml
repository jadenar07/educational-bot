services:
  postgres:
    image: postgres:17
    container_name: user-profiles-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./src/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: always
  pgadmin:
    image: dpage/pgadmin4
    container_name: user-profiles-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@park.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres